# Harness pre-commit: SCP validation for handoff/state.
# Install: pre-commit install
# Run manually: pre-commit run --all-files
#
# Paths: harness uses state/ at repo root. When copying to a project with .cursor/state/,
# update entry to python .cursor/scripts/sanitize_input.py and files to ^\.cursor/state/.*\.md$

repos:
  - repo: local
    hooks:
      - id: sanitize-input
        name: Sanitize input (handoff/state)
        entry: python scripts/sanitize_input.py
        language: system
        files: ^state/.*\.md$
        stages: [pre-commit]

      - id: handoff-scp
        name: Handoff SCP validation
        entry: python scripts/validate_handoff_scp.py
        language: system
        files: ^state/handoff_latest\.md$
        pass_filenames: false
        stages: [pre-commit]

      - id: verify-script-index
        name: Script index CHEATSHEET + capabilities manifest parity
        entry: python scripts/verify_script_index.py
        language: system
        files: ^(docs/CHEATSHEET\.md|capabilities\.harness\.yaml|scripts/.*)$
        pass_filenames: false
        stages: [pre-commit]

      - id: verify-skills-readme
        name: Skills README vs SKILL.md descriptions
        entry: python scripts/verify_skills_readme.py
        language: system
        files: ^(\.cursor/skills/README\.md|\.cursor/skills/.*/SKILL\.md)$
        pass_filenames: false
        stages: [pre-commit]

      - id: verify-contract-hash
        name: SCP contract SHA-256 fingerprint
        entry: python scripts/verify_contract_hash.py
        language: system
        files: ^docs/contracts/scp_mcp_v1\.(md|sha256)$
        pass_filenames: false
        stages: [pre-commit]
